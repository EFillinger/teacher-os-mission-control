<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Start Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
  font-family: 'Share Tech Mono', monospace;
  color: #ccc;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 40px 60px;
  overflow: hidden;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 2px solid #1a3a5c;
}
.class-name {
  font-family: 'Orbitron', monospace;
  font-size: 42px;
  font-weight: 700;
  color: #00ccff;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(0,204,255,0.3);
}
.clock {
  font-family: 'Orbitron', monospace;
  font-size: 48px;
  font-weight: 600;
  color: #ff9500;
  text-shadow: 0 0 20px rgba(255,149,0,0.3);
}

/* Main content */
.content {
  display: flex;
  flex: 1;
  gap: 60px;
  overflow: hidden;
}

/* Left side - Agenda */
.agenda-section {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 4px;
  color: #ff9500;
  margin-bottom: 25px;
  text-transform: uppercase;
}
.agenda-list {
  flex: 1;
}
.agenda-item {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 20px;
  padding: 15px 20px;
  background: rgba(0, 204, 255, 0.05);
  border-left: 4px solid #00ccff;
  border-radius: 0 8px 8px 0;
}
.agenda-num {
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  font-weight: 700;
  color: #00ccff;
  min-width: 50px;
}
.agenda-text {
  font-size: 24px;
  color: #e0e0e0;
  line-height: 1.4;
}

/* Right side - QOTD */
.qotd-section {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.qotd-box {
  background: rgba(255, 204, 0, 0.08);
  border: 2px solid #ffcc00;
  border-radius: 12px;
  padding: 30px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.qotd-text {
  font-size: 28px;
  color: #ffcc00;
  line-height: 1.6;
  font-style: italic;
  flex: 1;
}
.qotd-image {
  margin-top: 20px;
  max-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qotd-image img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 8px;
  object-fit: contain;
}

/* Reminders bar */
.reminders-bar {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 2px solid #1a3a5c;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.reminder-chip {
  background: rgba(255, 149, 0, 0.15);
  border: 1px solid #ff9500;
  border-radius: 8px;
  padding: 12px 20px;
  color: #ff9500;
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.reminder-chip::before {
  content: '⚡';
}

/* No data state */
.no-data {
  text-align: center;
  padding: 60px;
  color: #446;
}
.no-data h2 {
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  color: #00ccff;
  margin-bottom: 20px;
}
.no-data p {
  font-size: 16px;
  line-height: 1.8;
}
</style>
</head>
<body>

<div class="header">
  <div class="class-name" id="class-name">LOADING...</div>
  <div class="clock" id="clock">--:--</div>
</div>

<div class="content" id="content">
  <div class="no-data" id="no-data">
    <h2>WAITING FOR DATA</h2>
    <p>Launch this screen from Class Comm's<br>"LAUNCH START SCREEN" button to display<br>your agenda and question of the day.</p>
  </div>
</div>

<div class="reminders-bar" id="reminders"></div>

<script>
// Update clock
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  var t = h + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
  document.getElementById('clock').textContent = t;
}
updateClock();
setInterval(updateClock, 1000);

// Load data from localStorage
function loadData() {
  try {
    var stored = localStorage.getItem('classCommStartScreen');
    if (!stored) {
      console.log('No data in localStorage');
      return;
    }
    var data = JSON.parse(stored);
    console.log('Loaded data:', data);
    
    // Check if data is fresh (within last 5 minutes)
    var age = Date.now() - (data.timestamp || 0);
    if (age > 5 * 60 * 1000) {
      console.log('Data is stale:', age, 'ms old');
      // Still show it, just log warning
    }
    
    // Set class name
    document.getElementById('class-name').textContent = (data.className || 'CLASS').toUpperCase();
    
    // Build content
    var contentEl = document.getElementById('content');
    var html = '';
    
    // Agenda section
    html += '<div class="agenda-section">';
    html += '<div class="section-title">Today\'s Agenda</div>';
    html += '<div class="agenda-list">';
    if (data.agenda && data.agenda.length > 0) {
      data.agenda.forEach(function(item, i) {
        html += '<div class="agenda-item">';
        html += '<div class="agenda-num">' + String(i + 1).padStart(2, '0') + '</div>';
        html += '<div class="agenda-text">' + escapeHtml(item) + '</div>';
        html += '</div>';
      });
    } else {
      html += '<div class="agenda-item"><div class="agenda-text" style="color:#668;">No agenda items set</div></div>';
    }
    html += '</div></div>';
    
    // QOTD section
    html += '<div class="qotd-section">';
    html += '<div class="section-title">Question of the Day</div>';
    html += '<div class="qotd-box">';
    html += '<div class="qotd-text">' + escapeHtml(data.qotd || 'No question set for today') + '</div>';
    if (data.imageUrl) {
      html += '<div class="qotd-image"><img src="' + escapeHtml(data.imageUrl) + '" alt=""></div>';
    }
    html += '</div></div>';
    
    contentEl.innerHTML = html;
    
    // Reminders
    var remEl = document.getElementById('reminders');
    if (data.reminders && data.reminders.length > 0) {
      remEl.innerHTML = data.reminders.map(function(r) {
        return '<div class="reminder-chip">' + escapeHtml(r) + '</div>';
      }).join('');
    } else {
      remEl.innerHTML = '';
    }
    
  } catch (e) {
    console.error('Error loading data:', e);
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Load immediately
loadData();

// Also poll for updates every 2 seconds in case data changes
setInterval(loadData, 2000);
</script>
</body>
</html>
